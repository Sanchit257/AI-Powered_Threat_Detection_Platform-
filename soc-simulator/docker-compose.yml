services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - soc-net

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soc-net

  simulator:
    build: ./simulator
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - soc-net

  ml_engine:
    build: ./ml_engine
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - soc-net

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - soc-net

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    depends_on:
      - api
    networks:
      - soc-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - soc-net

networks:
  soc-net:
    name: soc-net
